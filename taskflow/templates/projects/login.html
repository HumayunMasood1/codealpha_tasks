{% block auth_content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — TaskFlow</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Task<span>Flow</span></div>
    <div class="auth-subtitle">Sign in to your workspace</div>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="form-group"><label>Username</label><input type="text" name="username" class="form-control" required autofocus></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" required></div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
    <div class="form-link">No account? <a href="/register/">Sign up</a></div>
  </div>
</div>
</body>
</html>
{% endblock %}
