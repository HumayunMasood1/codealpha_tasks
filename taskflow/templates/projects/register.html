{% block auth_content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register — TaskFlow</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Task<span>Flow</span></div>
    <div class="auth-subtitle">Create your account</div>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="form-group"><label>Username</label><input type="text" name="username" class="form-control" required autofocus></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control"></div>
      <div class="form-group"><label>Password</label><input type="password" name="password1" class="form-control" required></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" name="password2" class="form-control" required></div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <div class="form-link">Have an account? <a href="/login/">Login</a></div>
  </div>
</div>
</body>
</html>
{% endblock %}
