<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NexShop{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Nex<span>Shop</span></a>

    <form class="nav-search" method="GET" action="/">
      <input type="text" name="q" placeholder="Search products..." value="{{ request.GET.q }}">
      <button type="submit">🔍</button>
    </form>

    <div class="nav-actions">
      {% if user.is_authenticated %}
        <a href="/orders/" class="nav-link">My Orders</a>
        <a href="/logout/" class="nav-link">Logout</a>
      {% else %}
        <a href="/login/" class="nav-link">Login</a>
        <a href="/register/" class="btn-accent">Sign Up</a>
      {% endif %}

      <a href="/cart/" class="nav-cart">
        🛒 Cart
        <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </a>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

{% load static %}
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
